  # and ELEVENLABS_CONFIG.md:168. Key has been rotated and redacted in the next commit.
  "bf4c910b2bac9956ae8ed3ae19dfcd6df6eb774a",
  # Commits that contained a hardcoded Groq API key (gsk_...) in index.html.
  # The key has been rotated and removed from the codebase.
  "718011710d37b01da50a2d7329f608be1faccda7",
  "1910788d1ce0be0c7fedf4836d6a977fe343e85b",
  "c0c26b80e74e61c9c0f991dd6806c741a47d6656",
]
# ElevenLabs public voice IDs are not secrets — they are published in documentation
# and are safe to suppress globally.  The rotated Groq API key is already covered
# by the commits allowlist above, so it is NOT repeated here to avoid silencing any
# future detection of a similar-format key.
regexes = [
  "21m00Tcm4TlvDq8ikWAM",
]
