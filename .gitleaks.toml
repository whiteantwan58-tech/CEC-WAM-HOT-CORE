  "918182c041dae5bf22ccef5486824f24e1d6c991",
  # 65a1852: app.py contained PSI_COIN_TOKEN — a public Solana token mint address,
  # not a secret. The address is public blockchain data and has been removed from the file.
  "65a1852e2cc7a58132f96afad043794ec114446a",
  # 0ea3636, 84052711, 42adcb03: eve_cec_wam_live.py / EVE_CEC_WAM_LIVE.PY contained
  # DEFAULT_PSI_TOKEN_MINT — a public Solana token mint address, not a secret.
  # These files have been removed from the repository.
  "0ea36363ee4f96c459a06f67561774c02a211abd",
  "84052711b2f7f22b0638e879268f2b8f546d814c",
  "42adcb03624ed44f048e734f1d68bcd7bd857359",
