# gitleaks configuration
# See https://github.com/gitleaks/gitleaks#configuration

title = "CEC-WAM-HOT-CORE gitleaks config"

[extend]
# use the default ruleset
useDefault = true

[allowlist]
description = "Historical findings for credentials that have been rotated and removed from the codebase; public addresses and template placeholders that are not secrets"
commits = [
  # bf4c910: "Initial plan" commit on the delete-api-keys-branch. Per the original
  # gitleaks config this commit was associated with an ElevenLabs API key that has
  # since been rotated and removed. Kept for continuity with prior allowlist entries.
  "bf4c910b2bac9956ae8ed3ae19dfcd6df6eb774a",
  # 82b704e: Added ELEVENLABS_CONFIG.md which included the ElevenLabs API key.
  # Key has been rotated and redacted. Commit kept for history; key no longer active.
  "82b704ea8feebd85c2dbf216fb8b46cd1df66d38",
  # 0e6df68: Added CONFIGURATION_COMPLETE.md which included the ElevenLabs API key.
  # Key has been rotated and redacted. Commit kept for history; key no longer active.
  "0e6df68e268f924b8ade791e32261425f5575b55",
  # 656cd548: Merge commit that pulled in CONFIGURATION_COMPLETE.md and ELEVENLABS_CONFIG.md
  # containing the ElevenLabs API key. Key has been rotated and redacted.
  "656cd548cb3d14fb2caf1ce3e70350abce240445",
  # 58f4a80: .gitignore was (incorrectly) replaced with env variable content including
  # an API key and a template private-key placeholder. The key has been rotated.
  "58f4a80f5602a2579d5cdff32a23e344e62b9801",
  # 52a7c55: .env.example contained an API key and template private-key placeholder.
  # The key has been rotated and removed from the codebase.
