  # key (gsk_...). The key has been rotated and is no longer active.
  "91ddfbb623650d7c8c33f4721e3a018cc9f4913a",
]
# ElevenLabs public voice IDs are not secrets — they are published in documentation
# and are safe to suppress globally.  The rotated keys above are covered by the
# commits allowlist, so they are NOT repeated here to avoid silencing any future
# detection of a similar-format key.
# YOUR_PRIVATE_KEY_HERE is a documentation template placeholder used in .env.example
# to illustrate where a real private key would go; it is never a real credential.
regexes = [
  "21m00Tcm4TlvDq8ikWAM",
  "YOUR_PRIVATE_KEY_HERE",
]
