  # The key has been rotated and the file has been removed from the repository.
  "19107374a89e82d969eec249fe7ef0ede057ee35",
  # 49218a0, 28e6e4a: index.html contained a hardcoded Groq API key (gsk_...) in
  # earlier history — commits not covered by the three entries below. The key has
  # been rotated and removed from the codebase.
  "49218a0292dacfca31cf51581e0ae650e0293afb",
  "28e6e4a308561007b5b7372b42a59e01970a104a",
  # 718011710, 1910788, c0c26b80: additional index.html commits containing the same
