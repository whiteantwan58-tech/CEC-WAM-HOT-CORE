name: PSI Coin Contract Tests

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - "contracts/**"
      - ".github/workflows/psi-coin-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"

jobs:
  test:
    name: Compile & Test Solidity contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: contracts/package.json

      - name: Install dependencies
        working-directory: contracts
        run: npm install

      - name: Compile contracts
        working-directory: contracts
        run: npm run compile

      - name: Run tests
        working-directory: contracts
        run: npm test
