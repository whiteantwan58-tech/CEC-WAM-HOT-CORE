name: Secret Scanning (gitleaks)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Run weekly on Monday at 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  gitleaks:
    name: Detect secrets with gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks (git history + working tree)
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --log-opts="HEAD"
